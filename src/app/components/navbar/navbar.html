<header class="nav">
  <div class="container nav-inner">
    <div class="nav-main">
      <div class="brand">
        <span class="logo">
          <img src="Ampersand_logo.svg" alt="Ampersand logo" class="logo-img" />
        </span>
        <div>
          <!-- <div class="name">Ampersand</div> -->
          <div class="tag">Engineering Digital Excellence for Modern Business</div>
        </div>
      </div>
      <button
        type="button"
        class="nav-toggle"
        (click)="toggleMenu()"
        aria-label="Toggle navigation"
        aria-expanded="{{ menuOpen }}"
      >
        <span class="nav-toggle-bar"></span>
      </button>
    </div>

    <nav class="links" [class.open]="menuOpen">
      <a href="#home" [class.active]="activeSection === 'home'" (click)="closeMenu()">Home</a>
      <a href="#about" [class.active]="activeSection === 'about'" (click)="closeMenu()">About</a>
      <a href="#edge" [class.active]="activeSection === 'edge'" (click)="closeMenu()">Our Edge</a>
      <a href="#spotlight" [class.active]="activeSection === 'spotlight'" (click)="closeMenu()">Spotlight</a>
      <a href="#ai" [class.active]="activeSection === 'ai'" (click)="closeMenu()">AI</a>
      <a href="#support" [class.active]="activeSection === 'support'" (click)="closeMenu()">Support</a>
      <a
        class="cta"
        href="#contact"
        [class.active]="activeSection === 'contact'"
        [class.active-cta]="activeSection === 'contact'"
        (click)="closeMenu()"
      >
        Let’s Talk
      </a>
    </nav>
  </div>
</header>
